<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Player Card Generator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
</head>
<body>

    <div class="wrapper">
        <button id="generate-btn" class="btn">Generate Random NBA Player</button>
        
        <div class="profile-card" id="profile-card">
            <img id="user-image" src="https://cdn-icons-png.flaticon.com/512/889/889442.png" alt="NBA Player" class="profile-img">
            
            <div class="profile-info">
                <h2 id="player-name">Loading...</h2>
                <p id="player-team" style="font-weight: bold; color: #ff4757;">...</p>
                <p id="player-position" style="margin-bottom: 15px;">...</p>
                
                <div class="stats-grid">
                    <div class="stat-badge">
                        <span id="player-jersey" class="stat-value">--</span>
                        <span class="stat-label">Jersey</span>
                    </div>
                    <div class="stat-badge">
                        <span id="player-height" class="stat-value">--</span>
                        <span class="stat-label">Height</span>
                    </div>
                    <div class="stat-badge">
                        <span id="player-weight" class="stat-value">--</span>
                        <span class="stat-label">Weight</span>
                    </div>
                    <div class="stat-badge">
                        <span id="team-city" class="stat-value">--</span>
                        <span class="stat-label">City</span>
                    </div>
                    <div class="stat-badge">
                        <span id="team-conf" class="stat-value">--</span>
                        <span class="stat-label">Conf</span>
                    </div>
                    <div class="stat-badge">
                        <span id="team-div" class="stat-value">--</span>
                        <span class="stat-label">Division</span>
                    </div>
                </div>
                </div>
                
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Player Card Generator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
</head>
<body>

    <div class="wrapper">
        <button id="generate-btn" class="btn">Generate Random NBA Player</button>
        
        <div class="profile-card" id="profile-card" style="opacity: 0;">
            <img id="user-image" src="https://cdn-icons-png.flaticon.com/512/889/889442.png" alt="NBA Player" class="profile-img">
            
            <div class="profile-info">
                <h2 id="player-name">Loading...</h2>
                <p id="player-team" style="font-weight: bold; color: #ff4757;">...</p>
                <p id="player-position">...</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
